<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Trip Dispatch Form</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/trip_form.css">
</head>

<body onload="loadLayout()">

  <div id="sidebar"></div>

  <div class="main">
    <div id="navbar"></div>

    <div class="content">

      <div class="form-page">

        <!-- HEADER -->
        <div class="page-header">
          <h2>Assign Trip / Dispatch</h2>
        </div>

        <!-- FORM -->
        <form class="form-container">

          <!-- 1. BUILTY -->
          <div class="form-card">
            <h3>1. Builty Selection</h3>

            <div class="form-grid">
              <div>
                <label>Builty Number *</label>
                <input type="text" placeholder="Search builty...">
              </div>

              <div>
                <label>Customer Name</label>
                <input type="text" placeholder="Auto-filled">
              </div>

              <div>
                <label>Route</label>
                <input type="text" placeholder="From → To">
              </div>

              <div>
                <label>Freight Amount</label>
                <input type="text" placeholder="Rs.">
              </div>
            </div>
          </div>

          <!-- 2. VEHICLE -->
          <div class="form-card">
            <h3>2. Vehicle & Driver</h3>

            <div class="form-grid">
              <div>
                <label>Vehicle Number *</label>
                <input type="text" placeholder="ABC-123">
              </div>

              <div>
                <label>Driver Name *</label>
                <input type="text">
              </div>

              <div>
                <label>Driver Phone</label>
                <input type="text">
              </div>
            </div>
          </div>

          <!-- 3. DISPATCH -->
          <div class="form-card">
            <h3>3. Dispatch Details</h3>

            <div class="form-grid">
              <div>
                <label>Dispatch Date *</label>
                <input type="date">
              </div>

              <div>
                <label>Expected Delivery *</label>
                <input type="date">
              </div>
            </div>
          </div>

          <!-- 4. NOTES -->
          <div class="form-card">
            <h3>4. Notes</h3>

            <textarea placeholder="Enter instructions..."></textarea>
          </div>

          <!-- ACTIONS -->
          <div class="form-actions">
            <button type="button" class="btn-light">Cancel</button>
            <button type="button" class="btn-secondary">Save Draft</button>
            <button type="submit" class="primary-btn">Dispatch Trip</button>
          </div>

        </form>

      </div>

    </div>

    <div id="footer"></div>
  </div>

  <script src="../js/include.js"></script>
</body>
</html>
